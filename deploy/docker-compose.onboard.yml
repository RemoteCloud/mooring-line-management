# Onboard deployment: one vessel. API + its own Postgres + MinIO, self-contained.
# Runs with no shore connectivity. Set VESSEL_ID to the vessel this box serves.
# Distinct project name so the onboard stack coexists with shore on one host.
name: mooring-onboard
services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: mooring
      POSTGRES_PASSWORD: mooring
      POSTGRES_DB: mooring
    ports: ["5442:5432"]
    volumes: ["onboard_db:/var/lib/postgresql"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mooring"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9100:9000", "9101:9001"]
    volumes: ["onboard_minio:/data"]

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      SCOPE: onboard
      VESSEL_ID: ${VESSEL_ID:-00000000-0000-0000-0000-0000000000aa}
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://mooring:mooring@db:5432/mooring?sslmode=disable
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9100
      S3_BUCKET: mooring
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      # --- OIDC auth (secrets pulled from host env / .env; non-secrets inline) ---
      OIDC_ISSUER: ${OIDC_ISSUER:-https://administration.cloud.maranics-nightly.com/nightly}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-http://localhost:8090/api/auth/callback}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid email profile roles offline_access}
      OIDC_PROMPT: ${OIDC_PROMPT:-login}
      OIDC_ADMIN_GROUP: ${OIDC_ADMIN_GROUP:-0ee848c0-3469-4561-99ad-623d8eb87a7d}
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret-change-me}
      TOKEN_ENC_KEY: ${TOKEN_ENC_KEY:-}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8090}
    ports: ["8080:8080"]
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
      args:
        VITE_SCOPE: onboard
        VITE_VESSEL_ID: ${VESSEL_ID:-00000000-0000-0000-0000-0000000000aa}
    ports: ["8090:80"]
    depends_on: [api]

volumes:
  onboard_db:
  onboard_minio:
