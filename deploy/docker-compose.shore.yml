# Shore deployment: whole fleet. API + its own Postgres + MinIO. Fleet-wide scope.
# Onboard deployments reconcile to this via async outbox sync (not live requests).
# Distinct project name so the shore stack coexists with onboard on one host
# (both files live in deploy/, which would otherwise share the default project).
name: mooring-shore
services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: mooring
      POSTGRES_PASSWORD: mooring
      POSTGRES_DB: mooring
    ports: ["5433:5432"]
    volumes: ["shore_db:/var/lib/postgresql"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mooring"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9002:9000", "9003:9001"]
    volumes: ["shore_minio:/data"]

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      SCOPE: shore
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://mooring:mooring@db:5432/mooring?sslmode=disable
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9002
      S3_BUCKET: mooring
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      # --- OIDC auth (secrets pulled from host env / .env; non-secrets inline) ---
      OIDC_ISSUER: ${OIDC_ISSUER:-https://administration.cloud.maranics-nightly.com/nightly}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-http://localhost:8091/api/auth/callback}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid email profile roles offline_access}
      OIDC_PROMPT: ${OIDC_PROMPT:-login}
      OIDC_ADMIN_GROUP: ${OIDC_ADMIN_GROUP:-0ee848c0-3469-4561-99ad-623d8eb87a7d}
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret-change-me}
      TOKEN_ENC_KEY: ${TOKEN_ENC_KEY:-}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8091}
    ports: ["8081:8080"]
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
      args:
        VITE_SCOPE: shore
    ports: ["8091:80"]
    depends_on: [api]

volumes:
  shore_db:
  shore_minio:
