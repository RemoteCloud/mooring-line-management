server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA client-side routing: unknown paths fall back to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API calls to the api container, stripping the /api prefix
  # (matches the dev proxy behaviour).
  location /api/ {
    proxy_pass http://api:8080/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Self-hosted API reference (Stoplight) + the OpenAPI spec it loads, served by the
  # api container at the same paths so http://<web>/docs renders same-origin.
  location = /docs         { proxy_pass http://api:8080/docs;          proxy_set_header Host $host; }
  location /docs/          { proxy_pass http://api:8080/docs/;         proxy_set_header Host $host; }
  location = /openapi.json { proxy_pass http://api:8080/openapi.json;  proxy_set_header Host $host; }
  location = /openapi.yaml { proxy_pass http://api:8080/openapi.yaml;  proxy_set_header Host $host; }
}
